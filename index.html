<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResVault</title>
<style>
  :root {
    --bg: #000000; --card: #111111; --brand: #7c3aed; --text: #ffffff;
    --muted: #888888; --border: #222222; --green: #16a34a; --orange: #ea580c; --red: #dc2626;
  }
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
  .nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 18px; }
  .logo-icon { width: 32px; height: 32px; background: #000000; border: 2px solid #ffffff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; letter-spacing: -1px; }
  .menu { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
  .search-wrap { padding: 16px; }
  .search { width: 100%; padding: 14px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 16px; }
  .docs { padding: 0 16px 100px; }
  .doc { margin-bottom: 12px; padding: 16px; background: var(--card); border-radius: 16px; border: 1px solid var(--border); }
  .doc-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 8px; }
  .doc-name { font-size: 16px; font-weight: 600; }
  .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; }
  .badge.green { background: rgba(22, 163, 74, 0.2); color: var(--green); }
  .badge.orange { background: rgba(234, 88, 12, 0.2); color: var(--orange); }
  .badge.red { background: rgba(220, 38, 38, 0.2); color: var(--red); }
  .doc-type { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px; }
  .view { background: #2563eb; color: white; }
  .share { background: #16a34a; color: white; }
  .fab-col { position: fixed; bottom: 24px; right: 20px; display: flex; flex-direction: column; gap: 12px; }
  .fab { width: 56px; height: 56px; border-radius: 50%; border: none; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .fab.add { background: var(--brand); }
  .fab.affidavit { background: var(--red); font-size: 20px; }
  .beta { background: rgba(124, 58, 237, 0.1); border: 1px solid var(--brand); color: #a78bfa; padding: 12px; margin: 16px; border-radius: 12px; text-align: center; font-size: 14px; }
  .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: var(--card); border-right: 1px solid var(--border); transition: 0.3s; z-index: 20; padding: 20px; }
  .sidebar.open { left: 0; }
  .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
  .close { background: none; border: none; color: var(--text); font-size: 24px; cursor: pointer; }
  .menu-item { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 16px; cursor: pointer; }
  .overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; z-index: 15; }
  .overlay.show { display: block; }
</style>
</head>
<body>

    <div class="logo"><div class="logo-icon">RV</div>ResVault</div>
    <button class="menu" onclick="toggleMenu()">☰</button>
  </div>
  <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-icon">RV</div>ResVault</div>
      <button class="close" onclick="toggleMenu()">×</button>
    </div>
    <div class="menu-item" onclick="generateAffidavit()">⚖️ Generate Affidavit</div>
    <div class="menu-item" onclick="alert('Coming soon: Expiry alerts push to phone')">⏰ Expiry Alerts</div>
    <div class="menu-item" onclick="alert('ResVault V1.4\nGov-Ready Beta\nBuilt Polokwane, SA')">ℹ️ About</div>
  </div>
  <div class="beta">🇿🇦 Gov-Ready Beta: Expiry tracking + Affidavits + WhatsApp share. Free for SA citizens.</div>
  <div class="search-wrap">
    <input type="text" class="search" placeholder="Search Matric, ID, License..." id="search" oninput="filterDocs()">
  </div>
