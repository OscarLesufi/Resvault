<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f0f0f">
    <title>ResVault — SA Document Vault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f0f; color: #fff; min-height: 100vh;
        }
        .header { 
            background: #1a1a1a; padding: 16px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 20px; }
        .logo-icon { 
            width: 32px; height: 32px; background: #fff; color: #000; 
            border-radius: 6px; display: grid; place-items: center; font-weight: 900;
        }
        .menu-btn { background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
        .banner { 
            margin: 16px; padding: 12px; background: #2a1a4a; border: 1px solid #6b46c1;
            border-radius: 8px; font-size: 14px; line-height: 1.4;
        }
        .search-box { margin: 16px; }
        .search-box input { 
            width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333;
            border-radius: 8px; color: #fff; font-size: 16px;
        }
        .docs-grid { padding: 0 16px 80px; display: grid; gap: 12px; }
        .doc-card { 
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px; 
            padding: 16px; display: flex; gap: 12px;
        }
        .doc-icon { font-size: 32px; }
        .doc-content { flex: 1; }
        .doc-title { font-weight: 600; margin-bottom: 4px; }
        .doc-date { font-size: 12px; color: #888; margin-bottom: 8px; }
        .badge { 
            display: inline-block; padding: 4px 8px; border-radius: 4px; 
            font-size: 11px; font-weight: 700; text-transform: uppercase;
        }
        .badge-green { background: #065f46; color: #10b981; }
        .badge-orange { background: #7c2d12; color: #f97316; }
        .badge-red { background: #7f1d1d; color: #ef4444; }
        .doc-actions { display: flex; gap: 8px; margin-top: 12px; }
        .btn { 
            padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer;
            font-size: 14px; font-weight: 600;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-secondary { background: #374151; color: #fff; }
        .fab { 
            position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px;
            background: #3b82f6; border-radius: 50%; border: none; color: #fff;
            font-size: 24px; cursor: pointer; box-shadow: 0 4px 12px rgba(59,130,246,0.4);
        }
        .empty { text-align: center; padding: 40px 20px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <div class="logo-icon">RV</div>
            <span>ResVault</span>
        </div>
        <button class="menu-btn" onclick="alert('Menu: Generate Affidavit | About ResVault')">☰</button>
    </div>

    <div class="banner">
        🇿🇦 Gov-Ready Beta: Expiry tracking + Affidavits + WhatsApp share. Free for SA citizens.
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search Matric, ID, License..." oninput="renderDocs()">
    </div>

    <div class="docs-grid" id="docs"></div>

    <button class="fab" onclick="alert('Upload feature coming in V1.5')">+</button>

    <script>
        const documents = [
            {
                id: 1,
                name: "SA Smart ID Card",
                type: "id",
                icon: "🪪",
                date: "2023-01-15",
                expiry: null,
                number: "9001015800086"
            },
            {
                id: 2,
                name: "Matric Certificate 2023",
                type: "certificate",
                icon: "🎓",
                date: "2023-12-01",
                expiry: null,
                number: "2023/123456"
            },
            {
                id: 3,
                name: "Driver's License Code 8",
                type: "license",
                icon: "🚗",
                date: "2020-03-10",
                expiry: "2026-12-15",
                number: "DL1234567"
            },
            {
                id: 4,
                name: "Vehicle License Disk",
                type: "disk",
                icon: "🚙",
                date: "2024-01-01",
                expiry: "2024-12-31",
                number: "CA 123-456"
            }
        ];

        function getBadge(doc) {
            if (!doc.expiry) return '<span class="badge badge-green">No Expiry</span>';
            
            const today = new Date();
            const expiry = new Date(doc.expiry);
            const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
            
            if (daysLeft < 0) return '<span class="badge badge-red">Expired</span>';
            if (daysLeft <= 30) return `<span class="badge badge-orange">${daysLeft} days left</span>`;
            return '<span class="badge badge-green">Valid</span>';
        }

        function generateAffidavit(doc) {
            const text = `AFFIDAVIT\nI, the undersigned, hereby declare that my ${doc.name} (No: ${doc.number}) has been lost/stolen.\n\nDate of loss: ${new Date().toLocaleDateString()}\n\nI request a replacement document.\n\nSigned: _________________\nDate: ${new Date().toLocaleDateString()}\n\nCommissioner of Oaths`;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Affidavit_${doc.name.replace(/\s+/g, '_')}.txt`;
            a.click();
        }

        function shareWhatsApp(doc) {
            const msg = `ResVault Proof: My ${doc.name} (No: ${doc.number}) is ${doc.expiry ? 'valid until ' + doc.expiry : 'permanent'}. Verified via ResVault.`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderDocs() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = documents.filter(d => 
                d.name.toLowerCase().includes(query) || 
                d.number.toLowerCase().includes(query)
            );
            
            const html = filtered.length ? filtered.map(doc => `
                <div class="doc-card">
                    <div class="doc-icon">${doc.icon}</div>
                    <div class="doc-content">
                        <div class="doc-title">${doc.name}</div>
                        <div class="doc-date">No: ${doc.number} | Issued: ${doc.date}</div>
                        ${getBadge(doc)}
                        <div class="doc-actions">
                            <button class="btn btn-primary" onclick="shareWhatsApp(${JSON.stringify(doc).replace(/"/g, '&quot;')})">Share</button>
                            <button class="btn btn-secondary" onclick="generateAffidavit(${JSON.stringify(doc).replace(/"/g, '&quot;')})">⚖️</button>
                        </div>
                    </div>
                </div>
            `).join('') : '<div class="empty">No documents found</div>';
            
            document.getElementById('docs').innerHTML = html;
        }

        renderDocs();
    </script>
</body>
</html>
